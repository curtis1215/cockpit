<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cockpit · 版本追蹤器</title>

<!-- Tailwind (CDN，prototype 用；正式環境改本地 build) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: "class", theme: { extend: {} } };
</script>

<!-- 字體：介面 Inter / 標題 Space Grotesk / 版本號 & log JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  /* ---------- 主題色票（dark 為主，light 切換） ---------- */
  :root {
    --bg:          #f5f6f8;
    --bg-grid:     #eceef1;
    --surface:     #ffffff;
    --surface-2:   #f0f2f4;
    --surface-3:   #e7eaee;
    --border:      #e2e6ea;
    --border-2:    #d3d9df;
    --text:        #161a1f;
    --text-2:      #5b636e;
    --text-3:      #8b93a0;
    --accent:      #2f63ff;
    --accent-ink:  #ffffff;
    --accent-weak: #eaf0ff;
    --term-bg:     #0c0f14;
    --term-text:   #d6dbe2;

    --ok:    #1f9d5b;   --ok-bg:    #e4f5ec;   --ok-bd:    #b9e6cd;
    --warn:  #b5680a;   --warn-bg:  #fbeede;   --warn-bd:  #f1d5ab;
    --err:   #cf3030;   --err-bg:   #fbe6e6;   --err-bd:   #f1bfbf;
    --mut:   #6b7682;   --mut-bg:   #eef1f4;   --mut-bd:   #dde2e7;
  }
  html.dark {
    --bg:          #0a0c10;
    --bg-grid:     #0e1116;
    --surface:     #14181e;
    --surface-2:   #1a1f27;
    --surface-3:   #222831;
    --border:      #232a33;
    --border-2:    #2f3947;
    --text:        #e7eaef;
    --text-2:      #9aa4b2;
    --text-3:      #69727f;
    --accent:      #5b8cff;
    --accent-ink:  #0a0c10;
    --accent-weak: #15233f;
    --term-bg:     #07090c;
    --term-text:   #cdd3db;

    --ok:    #4ade80;   --ok-bg:    #11271b;   --ok-bd:    #1f4d33;
    --warn:  #f5b860;   --warn-bg:  #2a1f0e;   --warn-bd:  #5a4115;
    --err:   #f87171;   --err-bg:   #2a1313;   --err-bd:   #5a2424;
    --mut:   #9aa4b2;   --mut-bg:   #1a1f27;   --mut-bd:   #2c343f;
  }

  * { -webkit-font-smoothing: antialiased; }
  body {
    font-family: "Inter", system-ui, sans-serif;
    background-color: var(--bg);
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 44px 44px;
    color: var(--text);
    transition: background-color .25s, color .25s;
  }
  .font-display { font-family: "Space Grotesk", "Inter", sans-serif; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-ligatures: none; }

  /* ---------- 元件樣式（吃 CSS 變數，隨主題切換） ---------- */
  .surface  { background: var(--surface); border-color: var(--border); }
  .surface2 { background: var(--surface-2); }

  .btn {
    display: inline-flex; align-items: center; gap: .45rem;
    font-weight: 550; font-size: .8125rem; line-height: 1;
    padding: .5rem .8rem; border-radius: .5rem; cursor: pointer;
    border: 1px solid var(--border-2); color: var(--text);
    background: var(--surface-2); transition: .14s; white-space: nowrap;
  }
  .btn:hover { background: var(--surface-3); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
  .btn-primary:hover { filter: brightness(1.07); background: var(--accent); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-xs { padding: .3rem .6rem; font-size: .75rem; border-radius: .4rem; }

  .field {
    background: var(--surface); border: 1px solid var(--border-2);
    color: var(--text); border-radius: .5rem; font-size: .8125rem;
    padding: .5rem .7rem; transition: .14s; outline: none;
  }
  .field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-weak); }

  /* 狀態徽章 */
  .badge {
    display: inline-flex; align-items: center; gap: .35rem;
    font-size: .72rem; font-weight: 600; letter-spacing: .01em;
    padding: .2rem .5rem; border-radius: 999px; border: 1px solid;
    white-space: nowrap;
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }
  .b-ok    { color: var(--ok);   background: var(--ok-bg);   border-color: var(--ok-bd); }
  .b-warn  { color: var(--warn); background: var(--warn-bg); border-color: var(--warn-bd); }
  .b-err   { color: var(--err);  background: var(--err-bg);  border-color: var(--err-bd); }
  .b-mut   { color: var(--mut);  background: var(--mut-bg);  border-color: var(--mut-bd); }

  /* kind 小標籤 */
  .kind {
    font-family: "JetBrains Mono", monospace; font-size: .66rem; font-weight: 500;
    padding: .1rem .38rem; border-radius: .3rem; letter-spacing: .02em;
    border: 1px solid var(--border-2); color: var(--text-3); background: var(--surface-2);
  }

  /* 表格列 hover */
  .row-hover:hover { background: var(--surface-2); }

  /* nav tabs */
  .nav-tab { font-size: .82rem; font-weight: 550; padding: .4rem .7rem; border-radius: .5rem;
    color: var(--text-3); transition: .14s; text-decoration: none; display: inline-flex; align-items: center; gap: .4rem; }
  .nav-tab:hover { color: var(--text); background: var(--surface-2); }
  .nav-tab.active { color: var(--text); background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--border); }

  /* 終端機 */
  .term {
    background: var(--term-bg); color: var(--term-text);
    font-family: "JetBrains Mono", monospace; font-size: .78rem; line-height: 1.6;
  }
  .term-line { white-space: pre-wrap; word-break: break-word; }
  .term-line.in { animation: lineIn .18s ease-out; }
  @keyframes lineIn { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

  /* drawer / modal 動畫 + 兩種版面（側欄 / 底部） */
  #drawer { transition: transform .3s cubic-bezier(.22,.61,.36,1); }
  #drawer.side   { top: 0; right: 0; height: 100%; width: 100%; max-width: 480px;
                   border-left: 1px solid var(--border); transform: translateX(100%); }
  #drawer.side.open   { transform: translateX(0); }
  #drawer.bottom { left: 0; right: 0; bottom: 0; width: 100%; height: 46vh; min-height: 340px;
                   border-top: 1px solid var(--border); transform: translateY(100%);
                   box-shadow: 0 -12px 34px rgba(0,0,0,.22); }
  #drawer.bottom.open { transform: translateY(0); }

  .drawer-body { flex: 1; min-height: 0; display: flex; }
  #drawer.side   .drawer-body { flex-direction: column; }
  #drawer.bottom .drawer-body { flex-direction: row; }
  #drawer.bottom .job-current-wrap { flex: 1; min-width: 0; }
  #drawer.side   .recent-section { border-top: 1px solid var(--border); }
  #drawer.bottom .recent-section { order: -1; width: 244px; min-width: 244px;
                   border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #drawer.bottom #recent-list   { display: flex !important; max-height: none; flex: 1; }
  #drawer.bottom #recent-chevron { display: none; }
  #drawer.bottom #recent-toggle  { cursor: default; }

  .seg-btn { display: grid; place-items: center; width: 28px; height: 24px; border-radius: .35rem;
             color: var(--text-3); transition: .14s; cursor: pointer; }
  .seg-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.12); }

  .grp-btn { padding: .32rem .62rem; border-radius: .4rem; font-size: .76rem; font-weight: 550;
             color: var(--text-3); transition: .14s; cursor: pointer; white-space: nowrap; }
  .grp-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.12); }
  .group-head td { background: var(--surface-2); border-top: 1px solid var(--border); }

  #overlay, #modal-overlay { transition: opacity .2s; }
  .pop-in { animation: popIn .18s ease-out; }
  @keyframes popIn { from { opacity: 0; transform: translateY(6px) scale(.99); } to { opacity: 1; transform: none; } }

  /* spinner */
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pulse-dot { animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:.35 } }

  /* 捲軸 */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 999px; border: 3px solid transparent; background-clip: content-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); background-clip: content-box; }

  /* markdown(changelog) 簡易樣式 */
  .md p { margin: .35rem 0; }
  .md ul { margin: .35rem 0; padding-left: 1.1rem; list-style: disc; }
  .md li { margin: .28rem 0; }
  .md strong { color: var(--text); font-weight: 650; }
  .md code { font-family: "JetBrains Mono", monospace; font-size: .82em; background: var(--surface-2); padding: .05rem .3rem; border-radius: .25rem; border: 1px solid var(--border); }
</style>
</head>

<body class="min-h-screen">

  <!-- ================= HEADER ================= -->
  <header class="sticky top-0 z-30 surface border-b backdrop-blur" style="background: color-mix(in srgb, var(--surface) 88%, transparent);">
    <div class="max-w-[1280px] mx-auto px-5 py-3 flex items-center gap-4">
      <!-- 品牌 -->
      <div class="flex items-center gap-2.5 shrink-0">
        <div class="grid place-items-center w-8 h-8 rounded-lg" style="background: var(--accent); color: var(--accent-ink);">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        </div>
        <div class="leading-tight">
          <div class="font-display font-bold text-[15px] tracking-tight">cockpit</div>
          <div class="text-[11px]" style="color: var(--text-3);">版本追蹤器<span id="server-ver" class="mono" style="margin-left:.45rem;font-size:10px;color:var(--text-3);"></span></div>
        </div>
      </div>

      <!-- nav -->
      <nav class="flex items-center gap-1 ml-1.5">
        <a href="index.html" class="nav-tab active">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          清單
        </a>
        <a href="topology.html" class="nav-tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2.5"/><circle cx="5" cy="18" r="2.5"/><circle cx="19" cy="12" r="2.5"/><path d="M7.2 7.2 16.5 11M7.2 16.8 16.5 13"/></svg>
          拓樸
        </a>
        <a href="machine.html" class="nav-tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><line x1="7" y1="20" x2="17" y2="20"/><line x1="12" y1="16" x2="12" y2="20"/></svg>
          機器
        </a>
        <a href="manage.html" class="nav-tab">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          管理
        </a>
      </nav>

      <div class="flex-1"></div>

      <!-- 上次檢查 -->
      <div class="hidden sm:flex flex-col items-end leading-tight mr-1">
        <span class="text-[11px]" style="color: var(--text-3);">上次檢查</span>
        <span id="last-checked" class="text-[12px] font-medium" style="color: var(--text-2);">3 分鐘前</span>
      </div>

      <!-- 立即檢查 -->
      <button id="check-btn" class="btn btn-primary">
        <svg id="check-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
        <span id="check-label">立即檢查</span>
      </button>

      <!-- 深淺切換 -->
      <button id="theme-btn" class="btn btn-ghost" title="切換深/淺色" aria-label="切換深淺色">
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" class="hidden" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>

    <!-- ============ 篩選列 ============ -->
    <div class="border-t" style="border-color: var(--border);">
      <div id="filters" class="max-w-[1280px] mx-auto px-5 py-2.5 flex flex-wrap items-center gap-2.5">
        <!-- 機器下拉 -->
        <div class="relative">
          <select id="filter-machine" class="field pr-8 appearance-none cursor-pointer">
            <option value="">全部機器</option>
          </select>
          <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </div>

        <!-- 只看有更新 -->
        <button id="filter-updates" class="btn" aria-pressed="false">
          <span id="toggle-ui" class="relative inline-block w-7 h-4 rounded-full transition" style="background: var(--border-2);">
            <span id="toggle-knob" class="absolute top-0.5 left-0.5 w-3 h-3 rounded-full bg-white transition-transform"></span>
          </span>
          只看有更新
        </button>

        <!-- 分組視圖 -->
        <div class="flex items-center rounded-lg p-0.5" style="background: var(--surface-2);">
          <button data-group-btn="flat" class="grp-btn active">平鋪</button>
          <button data-group-btn="machine" class="grp-btn">依機器</button>
          <button data-group-btn="status" class="grp-btn">依狀態</button>
        </div>

        <!-- 搜尋 -->
        <div class="relative flex-1 min-w-[160px] max-w-[300px]">
          <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 pointer-events-none" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="filter-search" type="text" placeholder="搜尋軟體名…" class="field w-full pl-8" />
        </div>

        <div class="flex-1"></div>

        <!-- 統計摘要 -->
        <div id="summary" class="flex items-center gap-3 text-[12px]" style="color: var(--text-2);"></div>
      </div>
    </div>
  </header>

  <!-- ================= 主清單 ================= -->
  <main class="max-w-[1280px] mx-auto px-5 py-5 pb-24">
    <!-- 桌面表格 -->
    <div id="table-wrap" class="surface border rounded-xl overflow-hidden hidden md:block">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="text-[11px] uppercase tracking-wider" style="color: var(--text-3); background: var(--surface-2);">
            <th class="font-medium px-4 py-2.5">軟體</th>
            <th class="font-medium px-4 py-2.5">機器</th>
            <th class="font-medium px-4 py-2.5">目前版</th>
            <th class="font-medium px-4 py-2.5">最新版</th>
            <th class="font-medium px-4 py-2.5">狀態</th>
            <th class="font-medium px-4 py-2.5 text-center">Changelog</th>
            <th class="font-medium px-4 py-2.5 text-right">操作</th>
          </tr>
        </thead>
        <tbody id="table-body" data-partial="installs" style="--row-bd: var(--border);"></tbody>
      </table>
    </div>

    <!-- 窄螢幕卡片 -->
    <div id="card-list" data-partial="installs" class="md:hidden flex flex-col gap-2.5"></div>

    <!-- 空狀態 -->
    <div id="empty-state" class="hidden flex-col items-center justify-center text-center py-20 gap-3">
      <div class="grid place-items-center w-14 h-14 rounded-2xl b-ok">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
      <div class="font-display font-semibold text-lg" id="empty-title">全部都是最新版 🎉</div>
      <div class="text-[13px]" style="color: var(--text-2);" id="empty-sub">沒有待處理的更新。下次上游有新版時會出現在這裡。</div>
    </div>

    <!-- loading（檢查中）骨架 -->
    <div id="loading-state" class="hidden surface border rounded-xl p-3 flex-col gap-2"></div>
  </main>

  <!-- ================= Changelog Modal ================= -->
  <div id="modal-overlay" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background: rgba(0,0,0,.55);">
    <div id="modal-card" class="surface border rounded-xl w-full max-w-[600px] max-h-[82vh] flex flex-col shadow-2xl pop-in">
      <div class="flex items-start justify-between gap-4 px-5 py-4 border-b" style="border-color: var(--border);">
        <div>
          <div class="flex items-center gap-2">
            <span id="modal-software" class="font-display font-semibold text-[15px]"></span>
            <span id="modal-version" class="mono text-[13px] px-1.5 py-0.5 rounded" style="background: var(--accent-weak); color: var(--accent);"></span>
          </div>
          <div id="modal-date" class="text-[12px] mt-1" style="color: var(--text-3);"></div>
        </div>
        <button id="modal-close" class="btn btn-ghost btn-xs" aria-label="關閉">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="modal-body" data-partial="changelog" class="overflow-y-auto px-5 py-4">
        <div class="text-[11px] uppercase tracking-wider mb-2 font-medium" style="color: var(--text-3);">繁中重點</div>
        <div id="modal-zh" class="md text-[13.5px] leading-relaxed" style="color: var(--text-2);"></div>

        <details id="modal-raw-wrap" class="mt-5 group">
          <summary class="cursor-pointer text-[12px] font-medium select-none flex items-center gap-1.5" style="color: var(--text-3);">
            <svg class="transition-transform group-open:rotate-90" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            原文 changelog（raw）
          </summary>
          <pre id="modal-raw" class="mono text-[12px] mt-2 p-3 rounded-lg overflow-x-auto" style="background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border);"></pre>
        </details>
      </div>
    </div>
  </div>

  <!-- ================= 更新 Job Drawer ================= -->
  <div id="overlay" class="fixed inset-0 z-40 hidden" style="background: rgba(0,0,0,.45);"></div>
  <aside id="drawer" class="fixed z-50 surface flex flex-col side" data-layout="side">
    <!-- drawer header -->
    <div class="flex items-center justify-between px-4 py-3 border-b shrink-0" style="border-color: var(--border);">
      <div class="flex items-center gap-2">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        <span class="font-display font-semibold text-[14px]">更新工作</span>
        <span id="active-count" class="badge b-warn" style="display:none;"></span>
      </div>
      <div class="flex items-center gap-1.5">
        <!-- 版面切換：側欄 / 底部 -->
        <div class="flex items-center rounded-lg p-0.5" style="background: var(--surface-2);">
          <button data-layout-btn="side" class="seg-btn active" title="側欄" aria-label="側欄版面">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
          </button>
          <button data-layout-btn="bottom" class="seg-btn" title="底部" aria-label="底部版面">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
          </button>
        </div>
        <button id="drawer-close" class="btn btn-ghost btn-xs" aria-label="關閉">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>

    <div class="drawer-body">
      <!-- 當前 job -->
      <div id="job-current" data-partial="job-current" class="job-current-wrap overflow-y-auto flex flex-col"></div>

      <!-- 最近工作 -->
      <div class="recent-section shrink-0">
        <button id="recent-toggle" class="w-full flex items-center justify-between px-4 py-2.5 text-[12px] font-medium" style="color: var(--text-2);">
          <span class="flex items-center gap-1.5">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l4 2"/></svg>
            最近工作 <span id="recent-count" class="mono"></span>
          </span>
          <svg id="recent-chevron" class="transition-transform" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div id="recent-list" data-partial="recent" class="hidden max-h-[230px] overflow-y-auto px-3 pb-3 flex flex-col gap-1.5"></div>
      </div>
    </div>
  </aside>

  <!-- toast -->
  <div id="toast" class="fixed bottom-5 left-1/2 -translate-x-1/2 z-[60] hidden">
    <div class="surface border rounded-lg px-4 py-2.5 shadow-xl flex items-center gap-2.5 text-[13px]">
      <span id="toast-icon"></span><span id="toast-msg"></span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
