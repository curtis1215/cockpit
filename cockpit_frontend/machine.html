<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>cockpit · 機器 · 數據走勢</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg:#f5f6f8; --bg-grid:#eceef1; --surface:#ffffff; --surface-2:#f0f2f4; --surface-3:#e7eaee;
    --border:#e2e6ea; --border-2:#d3d9df; --text:#161a1f; --text-2:#5b636e; --text-3:#8b93a0;
    --accent:#2f63ff; --accent-ink:#ffffff; --accent-weak:#eaf0ff;
    --ok:#1f9d5b; --ok-bg:#e4f5ec; --ok-bd:#b9e6cd;
    --warn:#b5680a; --warn-bg:#fbeede; --warn-bd:#f1d5ab;
    --err:#cf3030; --err-bg:#fbe6e6; --err-bd:#f1bfbf;
    --mut:#6b7682; --mut-bg:#eef1f4; --mut-bd:#dde2e7;
    --chart-grid:#eef1f4;
  }
  html.dark {
    --bg:#0a0c10; --bg-grid:#0e1116; --surface:#14181e; --surface-2:#1a1f27; --surface-3:#222831;
    --border:#232a33; --border-2:#2f3947; --text:#e7eaef; --text-2:#9aa4b2; --text-3:#69727f;
    --accent:#5b8cff; --accent-ink:#0a0c10; --accent-weak:#15233f;
    --ok:#4ade80; --ok-bg:#11271b; --ok-bd:#1f4d33;
    --warn:#f5b860; --warn-bg:#2a1f0e; --warn-bd:#5a4115;
    --err:#f87171; --err-bg:#2a1313; --err-bd:#5a2424;
    --mut:#9aa4b2; --mut-bg:#1a1f27; --mut-bd:#2c343f;
    --chart-grid:#1c2230;
  }
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  body {
    margin: 0; font-family: "Inter", system-ui, sans-serif;
    background-color: var(--bg);
    background-image: linear-gradient(var(--bg-grid) 1px, transparent 1px), linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
    background-size: 44px 44px; color: var(--text); transition: background-color .25s, color .25s;
  }
  .font-display { font-family: "Space Grotesk","Inter",sans-serif; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-variant-ligatures: none; }

  .btn { display:inline-flex; align-items:center; gap:.45rem; font-weight:550; font-size:.8125rem; line-height:1; padding:.5rem .8rem; border-radius:.5rem; cursor:pointer; border:1px solid var(--border-2); color:var(--text); background:var(--surface-2); transition:.14s; white-space:nowrap; }
  .btn:hover { background: var(--surface-3); }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--surface-2); }
  .btn-xs { padding:.3rem .55rem; font-size:.75rem; border-radius:.4rem; }

  .nav-tab { font-size:.82rem; font-weight:550; padding:.4rem .7rem; border-radius:.5rem; color:var(--text-3); transition:.14s; text-decoration:none; display:inline-flex; align-items:center; gap:.4rem; }
  .nav-tab:hover { color: var(--text); background: var(--surface-2); }
  .nav-tab.active { color: var(--text); background: var(--surface-2); box-shadow: inset 0 0 0 1px var(--border); }

  .sdot { width:8px; height:8px; border-radius:999px; flex:none; }
  .s-online{background:var(--ok)} .s-warn{background:var(--warn)} .s-offline{background:var(--err)}
  .pulse{animation:pulse 1.6s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .tag{font-family:"JetBrains Mono",monospace;font-size:.64rem;font-weight:500;padding:.08rem .34rem;border-radius:.3rem;border:1px solid var(--border-2);color:var(--text-3);background:var(--surface-2);letter-spacing:.02em}
  .badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.7rem;font-weight:600;padding:.14rem .46rem;border-radius:999px;border:1px solid;white-space:nowrap}
  .b-ok{color:var(--ok);background:var(--ok-bg);border-color:var(--ok-bd)} .b-warn{color:var(--warn);background:var(--warn-bg);border-color:var(--warn-bd)} .b-err{color:var(--err);background:var(--err-bg);border-color:var(--err-bd)}

  /* 機器分頁 */
  .m-tab{display:flex;align-items:center;gap:8px;padding:8px 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:.14s;white-space:nowrap}
  .m-tab:hover{border-color:var(--border-2)}
  .m-tab.active{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-weak)}
  .m-tab .nm{font-size:13px;font-weight:600}
  .m-tab .rl{font-size:10.5px;color:var(--text-3)}

  /* 區間選擇 */
  .range-btn{font-size:12px;font-weight:550;padding:6px 12px;border-radius:8px;color:var(--text-3);cursor:pointer;transition:.14s}
  .range-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.12)}
  .s-pending{background:var(--accent)}

  /* 機器切換器（可搜尋，適合機器數量多時）*/
  .switcher{display:flex;align-items:center;gap:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:10px;padding:7px 11px;cursor:pointer;min-width:230px;transition:.14s}
  .switcher:hover{border-color:var(--border-2)}
  .sw-arrow{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:.14s;flex:none}
  .sw-arrow:hover:not(:disabled){background:var(--surface-2);color:var(--text)} .sw-arrow:disabled{opacity:.35;cursor:not-allowed}
  #m-popover{position:absolute;left:0;top:100%;z-index:40;margin-top:6px;width:340px;max-width:88vw;background:var(--surface);border:1px solid var(--border-2);border-radius:13px;box-shadow:0 18px 50px rgba(0,0,0,.34);overflow:hidden;display:none;color:var(--text)}
  #m-popover.show{display:block}
  .mp-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-radius:9px;color:var(--text)}
  .mp-item:hover,.mp-item.kbd{background:var(--surface-2)}
  .mp-item.sel{background:var(--accent-weak)}

  /* 卡片 */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px}
  .stat .v{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:22px;line-height:1}
  .chart-card{position:relative}
  .chart-wrap{position:relative}
  .crosshair{position:absolute;top:0;bottom:22px;width:1px;background:var(--border-2);pointer-events:none;opacity:0;transition:opacity .1s}
  .tip{position:absolute;pointer-events:none;background:var(--surface);border:1px solid var(--border-2);border-radius:8px;padding:5px 9px;font-size:11.5px;box-shadow:0 6px 18px rgba(0,0,0,.22);white-space:nowrap;opacity:0;transition:opacity .1s;z-index:5}
  .tip .tv{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:13px}
  .tip .tt{color:var(--text-3);font-size:10.5px}

  /* 搜尋輸入（機器切換器 popover 內） */
  .field{background:var(--surface);border:1px solid var(--border-2);color:var(--text);border-radius:.5rem;font-size:.8125rem;padding:.5rem .7rem;transition:.14s;outline:none;width:100%}
  .field:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-weak)}
  .field::placeholder{color:var(--text-3)}

  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:999px;border:3px solid transparent;background-clip:content-box}
  ::-webkit-scrollbar-thumb:hover{background:var(--text-3);background-clip:content-box}
  button { color: inherit; font: inherit; }
  #m-popover, #m-popover * { color: inherit; }
  #m-popover { color: var(--text); }
</style>
</head>
<body>
  <!-- HEADER -->
  <header style="position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--surface) 90%,transparent);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);">
    <div style="max-width:1240px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:16px;">
      <div style="display:flex;align-items:center;gap:10px;flex:none;">
        <div style="display:grid;place-items:center;width:32px;height:32px;border-radius:9px;background:var(--accent);color:var(--accent-ink);">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        </div>
        <div style="line-height:1.1;">
          <div class="font-display" style="font-weight:700;font-size:15px;letter-spacing:-.01em;">cockpit</div>
          <div style="font-size:11px;color:var(--text-3);">機器 · 數據走勢 <span id="server-ver" class="mono" style="opacity:.8;"></span></div>
        </div>
      </div>
      <nav style="display:flex;align-items:center;gap:4px;margin-left:6px;">
        <a class="nav-tab" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>清單</a>
        <a class="nav-tab" href="topology.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="6" r="2.5"/><circle cx="5" cy="18" r="2.5"/><circle cx="19" cy="12" r="2.5"/><path d="M7.2 7.2 16.5 11M7.2 16.8 16.5 13"/></svg>拓樸</a>
        <a class="nav-tab active" href="machine.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><line x1="7" y1="20" x2="17" y2="20"/><line x1="12" y1="16" x2="12" y2="20"/></svg>機器</a>
        <a class="nav-tab" href="manage.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>管理</a>
      </nav>
      <div style="flex:1;"></div>
      <div id="group-switcher" style="display:none;margin-right:4px;"></div>
      <button id="theme-btn" class="btn btn-ghost btn-xs" title="切換深/淺色" aria-label="切換深淺色">
        <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" style="display:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
    <!-- 機器切換器 -->
    <div style="border-top:1px solid var(--border);">
      <div style="max-width:1240px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:9px;">
        <button class="sw-arrow" id="m-prev" aria-label="上一台">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div style="position:relative;">
          <button class="switcher" id="m-switcher" aria-haspopup="listbox" aria-expanded="false">
            <span class="sdot" id="sw-dot"></span>
            <span style="flex:1;text-align:left;min-width:0;display:flex;align-items:center;gap:7px;"><span id="sw-name" style="font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></span><span id="sw-id" class="tag"></span></span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div id="m-popover" role="listbox">
            <div style="padding:9px;border-bottom:1px solid var(--border);position:relative;">
              <svg style="position:absolute;left:18px;top:50%;transform:translateY(-50%);pointer-events:none;" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <input id="mp-search" class="field" style="padding-left:30px;" placeholder="搜尋機器名稱或 ID…" />
            </div>
            <div id="mp-list" style="max-height:340px;overflow-y:auto;padding:5px;"></div>
          </div>
        </div>
        <button class="sw-arrow" id="m-next" aria-label="下一台">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <span id="m-count" style="font-size:12px;color:var(--text-3);margin-left:4px;"></span>
        <div style="flex:1;"></div>
        <a href="manage.html" class="btn btn-xs"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>新增機器</a>
      </div>
    </div>
  </header>

  <main style="max-width:1240px;margin:0 auto;padding:18px 20px 60px;">
    <!-- 機器標題 + 區間 -->
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
      <div id="machine-head"></div>
      <div style="display:flex;align-items:center;gap:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:3px;" id="range-tabs"></div>
    </div>

    <!-- 即時統計卡 -->
    <div id="stat-cards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:18px;"></div>

    <!-- 圖表網格 -->
    <div id="charts" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:14px;"></div>

    <!-- 容器 / 服務 -->
    <div id="containers" style="margin-top:18px;"></div>

    <!-- 離線狀態 -->
    <div id="offline-state" style="display:none;flex-direction:column;align-items:center;text-align:center;padding:64px 20px;gap:12px;"></div>
  </main>

  <script src="groups.js"></script>
  <script src="api-data.js"></script>
</body>
</html>
