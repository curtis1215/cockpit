version: 2

project_name: cockpit

builds:
  - id: cockpit
    main: ./cmd/cockpit
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - "-s -w -X main.version={{.Version}}"

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "cockpit_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    # Default files: LICENSE, README.md (if they exist) + binary

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: curtis1215
    name: cockpit

changelog:
  use: github
